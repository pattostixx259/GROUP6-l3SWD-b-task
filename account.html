<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account</title>
    <script src="account.js"></script>
    <link rel="stylesheet" href="pazzo.css">

</head>
<body>
    <header class="heading">
        
        <h1 >  <img src="signal-status.png" width="30" height="30"> SIMS| <span class="yy" style="font-size: small;">stock inventory management system</span></h1>
    </header>

<div class="container">
    <div class="card">
        <h2>Create Account</h2>
        <p>____________________________________________</p><br><br>

        <div class="input">
            <label  style="margin-right: 350px;" ><img src="user.png" width="30" height="30" >  Full name</label>
            <i class="fa-solid fa-user" id="icon"></i>
            <input type="text" placeholder=" Enter Full Name" required>
        </div>

        <div class="input">
            <label style="margin-right: 350px;" > <img src="envelope.png" width="25" height="25">    Email Address</label>
            <i class="fa-solid fa-envelope" id="icon"></i>
            <input type="email" placeholder="Enter Email Address" required>
        </div>

        <div class="input">
            <label style="margin-right: 370px;"> <img src="padlock.png"  width="25" height="25">  Password</label>
            <i class="fa-solid fa-lock" id="icon"></i>
            <input type="password" placeholder="Enter your Password" required>
        </div>

        <div class="input">
            <label style="margin-right: 320px;"> <img src="padlock.png" width="26" height="26"> Confirm Password</label>
            <i class="fa-solid fa-lock" id="icon"></i>
            <input type="password" placeholder="Confirm your Password" required>
        </div>

        <button class="btn">Register</button>
        <p>__________________________________________</p>
        <p>Already have an account? <a href="login.html">Login</a></p>
    </div> 
 
</body>
</html>
